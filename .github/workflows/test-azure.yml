name: Azure Tests

on:
  workflow_call:
  workflow_dispatch:

permissions:
  id-token: write # Required for OIDC
  contents: read # Required to checkout code

jobs:
  ignored_files:
    runs-on: ubuntu-latest
    name: Check for ignored files (Azure Tests)
    outputs:
      any_modified: ${{ steps.ignored-files-changed.outputs.any_modified }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Check for changed files
        id: ignored-files-changed
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files_ignore: |
            aws/**
            gcp/**
            .github/setup/aws/**
            .github/setup/gcp/**
            **.md
            **.env
            .gitignore
            LICENSE
            .github/workflows/test-aws*.yml
            .github/workflows/test-gcp*.yml
            .github/scripts/**
      - name: List all changed files
        run: |
          echo "Changed files: ${{ steps.ignored-files-changed.outputs.all_changed_files }}"
          echo "Are other files apart from ignored ones modified: ${{ steps.ignored-files-changed.outputs.any_modified }}"

  test-azure:
    name: Azure Infrastructure Tests
    runs-on: ubuntu-latest
    needs: ignored_files
    if: needs.ignored_files.outputs.any_modified == 'true' || github.event_name == 'workflow_dispatch'
    env:
      DURATION_SECONDS: 14400 # 4 hours

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials via OIDC (for S3 backend)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.GA_AWS_IAM_ROLE }}
          role-session-name: GitHubActions-Azure-S3Backend
          aws-region: ${{ vars.TF_TEST_S3_REGION }}
          # Max duration of the role is 8 hours as per IAM role configuration in .github/setup/aws/main.tf
          role-duration-seconds: ${{ env.DURATION_SECONDS }}

      - name: Verify AWS Authentication (for S3 backend)
        run: |
          echo "Testing AWS authentication for S3 backend..."
          aws sts get-caller-identity

      - name: Azure Login via OIDC
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure Authentication
        run: |
          echo "Testing Azure authentication..."
          az account show
          az account list-locations --output table

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.9.0"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            test/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('test/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build tests
        working-directory: test
        run: cargo build

      - name: Run Azure Tests
        working-directory: test
        env:
          MATERIALIZE_LICENSE_KEY: ${{ secrets.MATERIALIZE_LICENSE_KEY }}
          # Use OIDC directly with the AzureRM Terraform provider so it
          # can request fresh tokens from GitHub's OIDC endpoint as needed,
          # avoiding the short-lived Azure CLI token expiring mid-run.
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          cargo run -- run --destroy-on-failure azure \
            --owner "github-actions" \
            --subscription-id "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --location "${{ vars.AZURE_LOCATION }}" \
            --backend-s3-bucket "${{ vars.TF_TEST_S3_BUCKET }}" \
            --backend-s3-region "${{ vars.TF_TEST_S3_REGION }}"

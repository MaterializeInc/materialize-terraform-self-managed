name: Lint and Validate

on:
  workflow_call:

jobs:
  lint:
    name: Terraform Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.9.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          tflint_version: v0.58.0

      - name: Initialize TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive --format compact

  validate:
    name: Validate Simple Examples
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example:
          # Add new examples here as they are created
          - "aws/examples/simple"
          - "azure/examples/simple"
          - "gcp/examples/simple"
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.9.0"

      - name: Check if example exists
        id: check-dir
        run: |
          if [ ! -d "${{ matrix.example }}" ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ Example directory ${{ matrix.example }} does not exist, skipping"
          else
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Example directory ${{ matrix.example }} exists"
          fi

      - name: Terraform Init
        if: steps.check-dir.outputs.exists == 'true'
        run: |
          cd ${{ matrix.example }}
          terraform init -backend=false

      - name: Terraform Validate
        if: steps.check-dir.outputs.exists == 'true'
        run: |
          cd ${{ matrix.example }}
          terraform validate

  docs:
    name: Check Generated Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup terraform-docs
        uses: jaxxstorm/action-install-gh-release@25e24d2d23ae098373794ef1d6faecb48ee52da8 # v3.0.0
        with:
          repo: terraform-docs/terraform-docs
          tag: v0.19.0

      - name: Generate docs
        run: .github/scripts/generate-docs.sh

      - name: Check for diff
        run: |
          if ! git diff --exit-code; then
            echo "::error::Module README docs are out of date. Run .github/scripts/generate-docs.sh and commit the changes."
            exit 1
          fi

  lint-rust:
    name: Rust Tests Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            test/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('test/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        working-directory: test
        run: cargo fmt -- --check

      - name: Run clippy
        working-directory: test
        run: cargo clippy -- -D warnings

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Run cargo deny
        working-directory: test
        # Advisories are checked by the scheduled advisories.yml workflow so
        # that new RUSTSEC reports cannot flip a green merge queue red without
        # any code change in the PR. Bans/licenses/sources are deterministic
        # against Cargo.lock, so they stay blocking.
        run: cargo deny check bans licenses sources

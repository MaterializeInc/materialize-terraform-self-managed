name: AWS Tests

on:
  workflow_call:
  workflow_dispatch:

permissions:
  id-token: write # Required for OIDC
  contents: read # Required to checkout code

jobs:
  ignored_files:
    runs-on: ubuntu-latest
    name: Check for ignored files (AWS Tests)
    outputs:
      any_modified: ${{ steps.ignored-files-changed.outputs.any_modified }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Check for changed files
        id: ignored-files-changed
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files_ignore: |
            gcp/**
            azure/**
            .github/setup/azure/**
            **.md
            **.env
            .gitignore
            LICENSE
            .github/workflows/test-gcp*.yml
            .github/workflows/test-azure*.yml
            .github/scripts/**
      - name: List all changed files
        run: |
          echo "Changed files: ${{ steps.ignored-files-changed.outputs.all_changed_files }}"
          echo "Are other files apart from ignored ones modified: ${{ steps.ignored-files-changed.outputs.any_modified }}"

  test-aws:
    name: AWS Infrastructure Tests
    runs-on: ubuntu-latest
    needs: ignored_files
    if: needs.ignored_files.outputs.any_modified == 'true' || github.event_name == 'workflow_dispatch'
    # Note: Triggered automatically when approved PRs enter GitHub's merge queue
    # Smart path filtering ensures tests run only when AWS infrastructure changes
    env:
      DURATION_SECONDS: 14400 # 4 hours

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.GA_AWS_IAM_ROLE }}
          role-session-name: GitHubActions-AWS-Tests
          aws-region: ${{ vars.AWS_REGION }}
          # Max duration of the role is 8 hours as per IAM role configuration in .github/setup/aws/main.tf
          role-duration-seconds: ${{ env.DURATION_SECONDS }}

      - name: Verify AWS Authentication
        run: |
          echo "Testing AWS authentication..."
          aws sts get-caller-identity

      - name: Write AWS profile config
        run: |
          aws configure set region "${{ vars.AWS_REGION }}" --profile default
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID" --profile default
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY" --profile default
          aws configure set aws_session_token "$AWS_SESSION_TOKEN" --profile default

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.9.0"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            test/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('test/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build tests
        working-directory: test
        run: cargo build

      - name: Run AWS Tests
        working-directory: test
        env:
          MATERIALIZE_LICENSE_KEY: ${{ secrets.MATERIALIZE_LICENSE_KEY }}
        run: |
          cargo run -- run --destroy-on-failure aws \
            --owner "github-actions" \
            --aws-region "${{ vars.AWS_REGION }}" \
            --aws-profile "default" \
            --backend-s3-bucket "${{ vars.TF_TEST_S3_BUCKET }}" \
            --backend-s3-region "${{ vars.TF_TEST_S3_REGION }}"

      # Persist each run's directory (terraform.tfvars carries its region,
      # profile, and TestRun tag) so the separate `cleanup-aws` job can purge
      # leaked resources. The purge itself is NOT run here: on job cancellation
      # GitHub gives in-job cleanup steps only a ~5 minute grace period before
      # SIGTERM, far too short for purge (it waits up to 30 min for the EKS
      # cluster / RDS instance to drain). A fresh downstream job runs to its own
      # timeout instead. Uploading the (tiny, text-only) run dir fits the grace
      # window. `if-no-files-found: ignore` covers the success case, where the
      # harness already removed the run dir after a clean destroy.
      - name: Save test run state for cleanup
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aws-test-runs
          path: test/runs/
          if-no-files-found: ignore
          retention-days: 7

  # Guaranteed, tag-scoped cleanup that does not depend on terraform state being
  # correct. Runs as a separate job — rather than an `if: always()` step inside
  # `test-aws` — so that on cancellation it starts fresh and runs to its own
  # `timeout-minutes` instead of being killed by the ~5 minute cancellation
  # grace period that bounds in-job cleanup. It reads the surviving run's
  # TestRun tag (from the uploaded run dir) and deletes every AWS resource
  # carrying it. A no-op on success, since the harness removed the run dir after
  # a clean destroy and no artifact is produced.
  cleanup-aws:
    name: Clean up leaked AWS resources
    runs-on: ubuntu-latest
    needs: test-aws
    if: always() && needs.test-aws.result != 'skipped'
    # Generous: purge repeats its ordered sweep up to 5 times and waits on slow
    # EKS/RDS/NAT deletes. Must exceed those waits but stay under the job's own
    # cap so a stuck purge still surfaces.
    timeout-minutes: 90
    env:
      DURATION_SECONDS: 5400 # 90 minutes, matching timeout-minutes
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ vars.GA_AWS_IAM_ROLE }}
          role-session-name: GitHubActions-AWS-Cleanup
          aws-region: ${{ vars.AWS_REGION }}
          role-duration-seconds: ${{ env.DURATION_SECONDS }}

      - name: Write AWS profile config
        run: |
          aws configure set region "${{ vars.AWS_REGION }}" --profile default
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID" --profile default
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY" --profile default
          aws configure set aws_session_token "$AWS_SESSION_TOKEN" --profile default

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            test/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('test/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build tests
        working-directory: test
        run: cargo build

      - name: Download test run state
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: aws-test-runs
          path: test/runs/
        continue-on-error: true # No artifact == clean destroy, nothing to purge.

      - name: Purge leaked AWS resources
        working-directory: test
        run: |
          # The harness only removes test/runs/<id> after a successful destroy,
          # so a surviving run directory identifies the run whose destroy did
          # not complete. `list --latest` returns it (and exits non-zero / empty
          # when destroy succeeded and the directory was removed / not uploaded).
          run_id="$(cargo run --quiet -- list --latest 2>/dev/null || true)"
          if [ -n "$run_id" ]; then
            echo "Found leaked test run $run_id; purging its AWS resources."
            cargo run -- purge --test-run "$run_id"
          else
            echo "No leaked test run directory found; nothing to purge."
          fi

name: GCP Tests

on:
  workflow_call:
  workflow_dispatch:

permissions:
  id-token: write # Required for Workload Identity
  contents: read # Required to checkout code

jobs:
  ignored_files:
    runs-on: ubuntu-latest
    name: Check for ignored files (GCP Tests)
    outputs:
      any_modified: ${{ steps.ignored-files-changed.outputs.any_modified }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Check for changed files
        id: ignored-files-changed
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files_ignore: |
            aws/**
            azure/**
            .github/setup/aws/**
            .github/setup/azure/**
            **.md
            **.env
            .gitignore
            LICENSE
            .github/workflows/test-aws*.yml
            .github/workflows/test-azure*.yml
            .github/scripts/**
      - name: List all changed files
        run: |
          echo "Changed files: ${{ steps.ignored-files-changed.outputs.all_changed_files }}"
          echo "Are other files apart from ignored ones modified: ${{ steps.ignored-files-changed.outputs.any_modified }}"

  test-gcp:
    name: GCP Infrastructure Tests
    runs-on: ubuntu-latest
    needs: ignored_files
    if: needs.ignored_files.outputs.any_modified == 'true' || github.event_name == 'workflow_dispatch'
    env:
      DURATION_SECONDS: 14400 # 4 hours

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Configure AWS credentials via OIDC (for S3 backend)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ vars.GA_AWS_IAM_ROLE }}
          role-session-name: GitHubActions-GCP-S3Backend
          aws-region: ${{ vars.TF_TEST_S3_REGION }}
          # Max duration of the role is 8 hours as per IAM role configuration in .github/setup/aws/main.tf
          role-duration-seconds: ${{ env.DURATION_SECONDS }}

      - name: Authenticate to Google Cloud (Service Account Impersonation)
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          access_token_lifetime: ${{ env.DURATION_SECONDS }}s # 4 hours for long-running tests

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2.2.1

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin

      - name: Verify AWS Authentication (for S3 backend)
        run: |
          echo "Testing AWS authentication for S3 backend..."
          aws sts get-caller-identity

      - name: Verify GCP Authentication
        run: |
          echo "Testing GCP authentication..."
          gcloud auth list
          gcloud config list

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.9.0"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            test/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('test/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build tests
        working-directory: test
        run: cargo build

      - name: Run GCP Tests
        working-directory: test
        env:
          MATERIALIZE_LICENSE_KEY: ${{ secrets.MATERIALIZE_LICENSE_KEY }}
        run: |
          cargo run -- run --destroy-on-failure gcp \
            --owner "github-actions" \
            --project-id "${{ vars.GOOGLE_PROJECT }}" \
            --region "${{ vars.GOOGLE_REGION }}" \
            --backend-s3-bucket "${{ vars.TF_TEST_S3_BUCKET }}" \
            --backend-s3-region "${{ vars.TF_TEST_S3_REGION }}"

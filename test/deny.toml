[graph]
targets = [
    { triple = "aarch64-apple-darwin" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "x86_64-unknown-linux-gnu" },
]

[advisories]
version = 2
yanked = "deny"
unmaintained = "workspace"
ignore = [
]

[bans]
multiple-versions = "deny"
skip = [
    # Do not add to this list without good reason! Duplicate dependencies slow
    # down compilation and bloat the binary.

    # AWS SDK smithy crates internally support both http 0.2 and 1.x APIs
    # during their transition period. Cannot be eliminated from the consumer side.
    { name = "crypto-bigint", version = "0.4.9" },
    { name = "getrandom", version = "0.2.17" },
    { name = "http", version = "0.2.12" },
    { name = "http-body", version = "0.4.6" },
    { name = "rand_core", version = "0.6.4" },
]

# Use `tracing` instead.
[[bans.deny]]
name = "env_logger"

# Use `prost` or `protobuf-native` instead.
[[bans.deny]]
name = "protobuf"

# Use `sha1` instead, which the RustCrypto ecosystem recently took control of.
# `sha-1` is the older and now deprecated name.
[[bans.deny]]
name = "sha-1"

# Strum has suspect code quality and includes many unneeded features. Use
# more targeted enum macro crates, e.g. `enum-kinds`.
[[bans.deny]]
name = "strum"
[[bans.deny]]
name = "strum-macros"

# The `uncased` crate serves the same purpose as `unicase` and is more
# actively maintained.
[[bans.deny]]
name = "unicase"

# we don't want to pull in workspace-hack from the materialize repo, because
# it contains a ton of dependencies that we don't want, making our builds
# slower and flakier, and making our version bump process more complicated
[[bans.deny]]
name = "workspace-hack"

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]
private = { ignore = true }

[[licenses.clarify]]
name = "ring"
expression = "ISC"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[sources]
unknown-git = "deny"
unknown-registry = "deny"
# Do not allow non-MaterializeInc Git repositories here! Git repositories must
# be owned by the MaterializeInc organization so that maintainership is shared
# amongst Materialize employees and so that historical versions of Materialize
# remain buildable even if upstream Git repositories disappear. If you don't
# have permissions to create a fork in the MaterializeInc organization, ask in
# #eng-infra on Slack.
#allow-org = { github = ["MaterializeInc"] }
